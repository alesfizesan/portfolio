  <main id="main-content">
    <header class="hero">

        <div class="badge reveal-item" aria-hidden="true">
          <span class="pulse-dot"></span>

          </div>

            <dt class="stat-lbl">HOW DEEP IT GOES</dt>

          </div>
          <div class="stat">
            <dt class="stat-lbl">DEVELOPER FORM</dt>
            <dd class="stat-num" id="dev-pct">--</dd>
          </div>
        </dl>

      </div>
    </header>
